x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - videochat

x-job-defaults: &job-defaults
  networks:
    - videochat

x-http-healthcheck: &http-healthcheck
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 15s

services:
  frontend:
    <<: *service-defaults
    build:
      context: ../video-chat-angular
    container_name: ${FRONTEND_CONTAINER_NAME:-videochat-frontend}
    environment:
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      VIDEOCHAT_APP_MODE: ${VIDEOCHAT_APP_MODE:-production}
      VIDEOCHAT_AI_AGENT_ENABLED: ${VIDEOCHAT_AI_AGENT_ENABLED:-false}
      VIDEOCHAT_AI_AGENT_ENDPOINT: ${VIDEOCHAT_AI_AGENT_ENDPOINT:-/social-api/social/v1/rooms/{roomId}/assistant-replies}
      VIDEOCHAT_AI_AGENT_NAME: ${VIDEOCHAT_AI_AGENT_NAME:-Pulse Copilot}
      VIDEOCHAT_AI_AGENT_MENTION: ${VIDEOCHAT_AI_AGENT_MENTION:-@pulse}

  social-db:
    <<: *service-defaults
    image: ${SOCIAL_DB_IMAGE:-postgres:16-alpine}
    container_name: ${SOCIAL_DB_CONTAINER_NAME:-videochat-social-db}
    depends_on:
      vault-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${SOCIAL_DB_NAME:-videochat}
      POSTGRES_USER: ${SOCIAL_DB_USER:-videochat}
      POSTGRES_PASSWORD_FILE: /vault/runtime/social-db-password
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
      test: ["CMD-SHELL", "pg_isready -U ${SOCIAL_DB_USER:-videochat} -d ${SOCIAL_DB_NAME:-videochat}"]
    volumes:
      - social-db-data:/var/lib/postgresql/data
      - vault-runtime:/vault/runtime:ro

  minio:
    <<: *service-defaults
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: ${MINIO_CONTAINER_NAME:-videochat-minio}
    depends_on:
      vault-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/vault/scripts/start-minio-with-vault.sh"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-videochat-minio}
      MINIO_ROOT_PASSWORD_FILE: /vault/runtime/minio-root-password
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
    volumes:
      - minio-data:/data
      - ./vault/scripts:/vault/scripts:ro
      - vault-runtime:/vault/runtime:ro

  social-db-seed:
    <<: *job-defaults
    profiles:
      - dev-seed
    image: ${SOCIAL_DB_IMAGE:-postgres:16-alpine}
    container_name: ${SOCIAL_DB_SEED_CONTAINER_NAME:-videochat-social-db-seed}
    depends_on:
      vault-init:
        condition: service_completed_successfully
      social-db:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/vault/scripts/start-social-db-seed-with-vault.sh"]
    environment:
      PGHOST: social-db
      PGPORT: 5432
      PGDATABASE: ${SOCIAL_DB_NAME:-videochat}
      PGUSER: ${SOCIAL_DB_USER:-videochat}
      PGPASSWORD_FILE: /vault/runtime/social-db-password
      SOCIAL_DB_SEED_ENABLED: ${SOCIAL_DB_SEED_ENABLED:-false}
      SOCIAL_DB_SEED_FORCE: ${SOCIAL_DB_SEED_FORCE:-false}
    volumes:
      - ./scripts:/seed/scripts:ro
      - ./db:/seed/db:ro
      - ../video-chat-backoffice/src/main/resources/db/migration:/seed/backoffice-migrations:ro
      - ./vault/scripts:/vault/scripts:ro
      - vault-runtime:/vault/runtime:ro

  vault:
    <<: *service-defaults
    image: ${VAULT_IMAGE:-hashicorp/vault:1.17}
    container_name: ${VAULT_CONTAINER_NAME:-videochat-vault}
    cap_add:
      - IPC_LOCK
    command: >
      vault server
      -dev
      -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-videochat-dev-root-token}
      -dev-listen-address=0.0.0.0:8200
    ports:
      - "${VAULT_HOST_PORT:-8200}:8200"
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8200/v1/sys/health >/dev/null || exit 1"]

  vault-init:
    <<: *job-defaults
    image: ${VAULT_IMAGE:-hashicorp/vault:1.17}
    container_name: ${VAULT_INIT_CONTAINER_NAME:-videochat-vault-init}
    depends_on:
      vault:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/vault/scripts/init-vault.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-videochat-dev-root-token}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_PROVIDER_FIELD: ${VAULT_PROVIDER_FIELD:-jwks_json}
      VAULT_RUNTIME_DIR: /vault/runtime
      VAULT_SOCIAL_DB_SECRET_PATH: ${VAULT_SOCIAL_DB_SECRET_PATH:-runtime/social-db}
      VAULT_MINIO_SECRET_PATH: ${VAULT_MINIO_SECRET_PATH:-runtime/minio}
      VAULT_GRAFANA_SECRET_PATH: ${VAULT_GRAFANA_SECRET_PATH:-runtime/grafana}
      VAULT_BROKER_POLICY_NAME: ${VAULT_BROKER_POLICY_NAME:-broker-jwt-read}
      VAULT_BOOTSTRAP_SOCIAL_DB_PASSWORD: ${VAULT_BOOTSTRAP_SOCIAL_DB_PASSWORD:-}
      VAULT_BOOTSTRAP_MINIO_ROOT_PASSWORD: ${VAULT_BOOTSTRAP_MINIO_ROOT_PASSWORD:-}
      VAULT_BOOTSTRAP_GRAFANA_ADMIN_PASSWORD: ${VAULT_BOOTSTRAP_GRAFANA_ADMIN_PASSWORD:-}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      SOCIAL_DB_NAME: ${SOCIAL_DB_NAME:-videochat}
      SOCIAL_DB_USER: ${SOCIAL_DB_USER:-videochat}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-videochat-minio}
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      VAULT_GOOGLE_SECRET_PATH: ${VAULT_GOOGLE_SECRET_PATH:-jwt/providers/google}
      VAULT_GOOGLE_JWKS_URL: ${VAULT_GOOGLE_JWKS_URL:-https://www.googleapis.com/oauth2/v3/certs}
      VAULT_APPLE_SECRET_PATH: ${VAULT_APPLE_SECRET_PATH:-jwt/providers/apple}
      VAULT_APPLE_JWKS_URL: ${VAULT_APPLE_JWKS_URL:-https://appleid.apple.com/auth/keys}
      VAULT_X_SECRET_PATH: ${VAULT_X_SECRET_PATH:-jwt/providers/x}
      VAULT_X_JWKS_URL: ${VAULT_X_JWKS_URL:-}
    volumes:
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/secrets:/vault/secrets:ro
      - vault-runtime:/vault/runtime

  broker:
    <<: *service-defaults
    build:
      context: ../video-chat-rsocket-broker
    container_name: ${BROKER_CONTAINER_NAME:-videochat-broker}
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/vault/scripts/start-broker-with-vault.sh"]
    environment:
      BROKER_BACKOFFICE_ENDPOINT: ws://backoffice:7901/rsocket
      BROKER_JWT_ENABLED: ${BROKER_JWT_ENABLED:-true}
      BROKER_JWT_CACHE_TTL: ${BROKER_JWT_CACHE_TTL:-15m}
      BROKER_JWT_CLOCK_SKEW: ${BROKER_JWT_CLOCK_SKEW:-30s}
      BROKER_JWT_VAULT_URI: http://vault:8200
      BROKER_JWT_VAULT_TOKEN_FILE: /vault/runtime/broker-jwt-vault-token
      BROKER_JWT_VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      SPRING_APPLICATION_JSON: >-
        {
          "broker": {
            "jwt": {
              "providers": [
                {
                  "enabled": ${BROKER_JWT_GOOGLE_ENABLED:-true},
                  "name": "google",
                  "issuers": ["https://accounts.google.com", "accounts.google.com"],
                  "audiences": ["${BROKER_JWT_GOOGLE_AUDIENCE:-}"],
                  "vaultPath": "${VAULT_GOOGLE_SECRET_PATH:-jwt/providers/google}",
                  "vaultField": "${VAULT_PROVIDER_FIELD:-jwks_json}"
                },
                {
                  "enabled": ${BROKER_JWT_APPLE_ENABLED:-false},
                  "name": "apple",
                  "issuers": ["https://appleid.apple.com"],
                  "vaultPath": "${VAULT_APPLE_SECRET_PATH:-jwt/providers/apple}",
                  "vaultField": "${VAULT_PROVIDER_FIELD:-jwks_json}"
                },
                {
                  "enabled": ${BROKER_JWT_X_ENABLED:-false},
                  "name": "x",
                  "vaultPath": "${VAULT_X_SECRET_PATH:-jwt/providers/x}",
                  "vaultField": "${VAULT_PROVIDER_FIELD:-jwks_json}"
                }
              ]
            }
          }
        }
    volumes:
      - ./vault/scripts:/vault/scripts:ro
      - vault-runtime:/vault/runtime:ro
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9898/actuator/health >/dev/null || exit 1"]

  backoffice:
    <<: *service-defaults
    build:
      context: ../video-chat-backoffice
    container_name: ${BACKOFFICE_CONTAINER_NAME:-videochat-backoffice}
    depends_on:
      vault-init:
        condition: service_completed_successfully
      social-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/vault/scripts/start-backoffice-with-vault.sh"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://social-db:5432/${SOCIAL_DB_NAME:-videochat}
      SPRING_DATASOURCE_USERNAME: ${SOCIAL_DB_USER:-videochat}
      SPRING_DATASOURCE_PASSWORD_FILE: /vault/runtime/social-db-password
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      BACKOFFICE_AI_ENABLED: ${BACKOFFICE_AI_ENABLED:-false}
      BACKOFFICE_AI_API_KEY: ${BACKOFFICE_AI_API_KEY:-}
      BACKOFFICE_AI_MODEL: ${BACKOFFICE_AI_MODEL:-gpt-5-mini}
      BACKOFFICE_AI_ASSISTANT_NAME: ${BACKOFFICE_AI_ASSISTANT_NAME:-Pulse Copilot}
      BACKOFFICE_SOCIAL_GOOGLE_AUDIENCE: ${BACKOFFICE_SOCIAL_GOOGLE_AUDIENCE:-}
      BACKOFFICE_SOCIAL_MEDIA_ENABLED: ${BACKOFFICE_SOCIAL_MEDIA_ENABLED:-true}
      BACKOFFICE_SOCIAL_MEDIA_ENDPOINT: http://minio:9000
      BACKOFFICE_SOCIAL_MEDIA_ACCESS_KEY: ${MINIO_ROOT_USER:-videochat-minio}
      BACKOFFICE_SOCIAL_MEDIA_SECRET_KEY_FILE: /vault/runtime/minio-root-password
      BACKOFFICE_SOCIAL_MEDIA_BUCKET: ${BACKOFFICE_SOCIAL_MEDIA_BUCKET:-social-media}
      BACKOFFICE_SOCIAL_MEDIA_MAX_UPLOAD_BYTES: ${BACKOFFICE_SOCIAL_MEDIA_MAX_UPLOAD_BYTES:-26214400}
      BACKOFFICE_SOCIAL_MEDIA_MAX_FILES_PER_POST: ${BACKOFFICE_SOCIAL_MEDIA_MAX_FILES_PER_POST:-4}
    volumes:
      - ./vault/scripts:/vault/scripts:ro
      - vault-runtime:/vault/runtime:ro
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7901/actuator/health >/dev/null || exit 1"]

  caddy:
    <<: *service-defaults
    image: ${CADDY_IMAGE:-caddy:2.10.2}
    container_name: ${CADDY_CONTAINER_NAME:-videochat-caddy}
    depends_on:
      frontend:
        condition: service_started
      vault:
        condition: service_healthy
      broker:
        condition: service_healthy
      backoffice:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      VIDEOCHAT_HOST: ${VIDEOCHAT_HOST:-localhost}
      CADDY_LOCAL_CA_FILENAME: ${CADDY_LOCAL_CA_FILENAME:-caddy-local-root-ca.crt}
      BACKOFFICE_API_EXPOSED: ${BACKOFFICE_API_EXPOSED:-false}
      BACKOFFICE_RSOCKET_EXPOSED: ${BACKOFFICE_RSOCKET_EXPOSED:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./${CADDY_LOCAL_CA_FILENAME:-caddy-local-root-ca.crt}:/srv/local-ca.crt:ro
      - caddy-data:/data
      - caddy-config:/config

  blackbox:
    <<: *service-defaults
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:v0.25.0}
    container_name: ${BLACKBOX_EXPORTER_CONTAINER_NAME:-videochat-blackbox}
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./monitoring/prometheus/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  prometheus:
    <<: *service-defaults
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    container_name: ${PROMETHEUS_CONTAINER_NAME:-videochat-prometheus}
    depends_on:
      broker:
        condition: service_healthy
      backoffice:
        condition: service_healthy
      blackbox:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    <<: *service-defaults
    image: ${LOKI_IMAGE:-grafana/loki:3.6.0}
    container_name: ${LOKI_CONTAINER_NAME:-videochat-loki}
    user: "0"
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    <<: *service-defaults
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.6.0}
    container_name: ${PROMTAIL_CONTAINER_NAME:-videochat-promtail}
    depends_on:
      loki:
        condition: service_started
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock

  grafana:
    <<: *service-defaults
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.1.0}
    container_name: ${GRAFANA_CONTAINER_NAME:-videochat-grafana}
    depends_on:
      vault-init:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /vault/runtime/grafana-admin-password
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards/videochat:ro
      - grafana-data:/var/lib/grafana
      - vault-runtime:/vault/runtime:ro

networks:
  videochat:
    name: videochat-network

volumes:
  caddy-data:
  caddy-config:
  grafana-data:
  loki-data:
  minio-data:
    name: ${MINIO_VOLUME_NAME:-minio-data}
  prometheus-data:
  social-db-data:
    name: ${SOCIAL_DB_VOLUME_NAME:-social-db-data}
  vault-runtime:
