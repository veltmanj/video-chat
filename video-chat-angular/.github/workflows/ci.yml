name: Frontend CI

on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "angular.json"
      - "karma.conf.cjs"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "angular.json"
      - "karma.conf.cjs"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:ci
