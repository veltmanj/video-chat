server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss: https://accounts.google.com https://www.googleapis.com https://oauth2.googleapis.com; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    expires -1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
