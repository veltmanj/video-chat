<section class="feed-column">
  <div class="panel composer-panel">
    <p class="kicker">New post</p>
    <textarea
      [ngModel]="newPostBody"
      (ngModelChange)="newPostBodyChange.emit($event)"
      name="newPostBody"
      rows="4"
      maxlength="2000"
      placeholder="Share an update with your network."></textarea>
    <label class="upload-picker">
      <span>Add images or videos</span>
      <input type="file" accept="image/*,video/*" multiple (change)="composerFilesSelected.emit($event)">
    </label>

    <div class="composer-upload-list" *ngIf="composerUploads.length">
      <article class="composer-upload-card" *ngFor="let upload of composerUploads; trackBy: trackByComposerUpload">
        <img *ngIf="upload.kind === 'IMAGE'" [src]="upload.previewUrl" [alt]="upload.file.name">
        <video *ngIf="upload.kind === 'VIDEO'" [src]="upload.previewUrl" muted playsinline preload="metadata"></video>
        <div class="composer-upload-meta">
          <strong>{{ upload.file.name }}</strong>
          <small>{{ upload.kind === 'VIDEO' ? 'Video' : 'Image' }} · {{ formatUploadSize(upload.file.size) }}</small>
        </div>
        <button type="button" class="ghost-button" (click)="removeComposerUpload.emit(upload.id)">Remove</button>
      </article>
    </div>

    <button type="button" (click)="publishPost.emit()" [disabled]="!canPublishPost">
      {{ publishingPost ? 'Publishing...' : 'Publish' }}
    </button>
  </div>

  <p class="status-banner" *ngIf="statusMessage">{{ statusMessage }}</p>
  <p class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</p>

  <article class="panel post-card" *ngFor="let post of feed; trackBy: trackByPost">
    <header>
      <div>
        <h2>{{ post.authorDisplayName }}</h2>
        <p>@{{ post.authorHandle }}</p>
      </div>
      <time>{{ post.createdAt | date:'medium' }}</time>
    </header>
    <p class="post-body" *ngIf="post.body">{{ post.body }}</p>
    <div class="post-media-grid" *ngIf="post.media.length">
      <figure class="post-media-card" *ngFor="let media of post.media; trackBy: trackByMedia">
        <img *ngIf="media.kind === 'IMAGE' && mediaUrl(media.id) as source" [src]="source" [alt]="media.fileName">
        <video *ngIf="media.kind === 'VIDEO' && mediaUrl(media.id) as source" [src]="source" controls playsinline preload="metadata"></video>
        <div class="media-placeholder" *ngIf="!mediaUrl(media.id)">
          <span>Loading {{ media.kind === 'VIDEO' ? 'video' : 'image' }}...</span>
        </div>
      </figure>
    </div>
    <div class="reaction-row">
      <button
        type="button"
        *ngFor="let reaction of reactionOptions"
        [class.active]="post.viewerReactions.includes(reaction)"
        (click)="toggleReaction.emit({ post, reaction })">
        {{ reaction }} {{ post.reactionCounts[reaction] || 0 }}
      </button>
    </div>
  </article>
</section>
