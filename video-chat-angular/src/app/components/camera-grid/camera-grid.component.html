<section class="grid">
  <article class="tile" *ngFor="let feed of feeds">
    <header class="tile-header">
      <div>
        <h3>{{ feed.ownerName }}</h3>
        <p>{{ getFeedSubtitle(feed) }}</p>
      </div>
      <span class="badge" [class.badge-local]="feed.local">{{ feed.local ? 'LOCAL' : 'REMOTE' }}</span>
    </header>

    <div class="video-shell" [class.video-shell-offline]="!feed.online">
      <video
        #feedVideo
        *ngIf="feed.stream"
        autoplay
        playsinline
        [muted]="isVideoMuted(feed)"
        [attr.data-feed-id]="feed.id">
      </video>

      <div class="placeholder" [class.placeholder-offline]="!feed.online" *ngIf="!feed.stream">
        <ng-container *ngIf="showOfflineAvatar(feed); else placeholderStatus">
          <img
            class="offline-avatar"
            [src]="feed.ownerProfileImageUrl!"
            [alt]="getOfflineAvatarAlt(feed)">
        </ng-container>
        <ng-template #placeholderStatus>
          <div class="pulse" [class.pulse-offline]="!feed.online"></div>
          <p>{{ feed.online ? 'Wachten op stream...' : 'Offline' }}</p>
        </ng-template>
      </div>
    </div>

    <footer class="tile-footer" *ngIf="feed.local || hasAudioControl(feed)">
      <button
        class="secondary"
        *ngIf="hasAudioControl(feed)"
        type="button"
        (click)="toggleFeedAudio.emit(feed.id)">
        {{ getAudioButtonLabel(feed) }}
      </button>
      <button *ngIf="feed.local" type="button" (click)="removeFeed.emit(feed.id)">Stop camera</button>
    </footer>
  </article>
</section>
