<main class="live-shell">
  <section class="stage-header">
    <div class="stage-copy">
      <div class="room-brand">
        <img class="room-logo" src="assets/pulseroom-mark.svg" alt="PulseRoom">
        <div>
          <p class="room-kicker">PulseRoom Main Stage</p>
          <h1>Live control room</h1>
        </div>
      </div>
      <p>{{ stageSubtitle }}</p>
    </div>

    <section class="camera-controls" aria-label="Camera controls">
      <div class="camera-toolbar">
        <label class="camera-picker">
          Camera
          <select [(ngModel)]="selectedDeviceSelection" name="selectedDeviceSelection">
          <option value="">Selecteer camera</option>
          <option *ngFor="let device of devices; let i = index" [value]="i">{{ device.label }}</option>
          </select>
        </label>
        <button type="button" class="ghost" (click)="refreshDevices()">Refresh</button>
        <button type="button" (click)="addCamera()" [disabled]="!canAddCamera()">{{ addCameraLabel }}</button>
      </div>
      <p class="camera-note">The room auto-connects after sign-in. Add a camera whenever you are ready.</p>
    </section>
  </section>

  <section *ngIf="uiError" class="status-banner">
    <p class="status-error">{{ uiError }}</p>
  </section>

  <section class="stage-layout">
    <app-camera-grid
      class="grid-zone"
      [feeds]="feeds"
      (removeFeed)="removeCamera($event)"
      (toggleFeedAudio)="toggleFeedAudio($event)">
    </app-camera-grid>

    <app-chat-panel
      class="chat-zone"
      [aiAgentBusy]="aiAgentBusy"
      [aiAgentEnabled]="aiAgentEnabled"
      [aiAgentMention]="aiAgentMention"
      [aiAgentName]="aiAgentName"
      [messages]="messages"
      [connected]="connected"
      (sendMessage)="sendMessage($event)">
    </app-chat-panel>
  </section>
</main>
