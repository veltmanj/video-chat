<main class="social-page" *ngIf="!loading; else loadingState">
  <app-social-profile-column
    *ngIf="me as profile"
    [profile]="profile"
    [accessGrants]="accessGrants"
    [avatarUrl]="profileAvatarUrl(profile)"
    [profileInitials]="profileInitials(profile.displayName)"
    [avatarUploading]="avatarUploading"
    [(displayName)]="displayName"
    [(bio)]="bio"
    [(visibility)]="visibility"
    (avatarFileSelected)="onAvatarFileSelected($event)"
    (clearAvatar)="clearAvatar()"
    (saveProfile)="saveProfile()"></app-social-profile-column>

  <app-social-feed-column
    [composerUploads]="composerUploads"
    [(newPostBody)]="newPostBody"
    [publishingPost]="publishingPost"
    [canPublishPost]="canPublishPost"
    [statusMessage]="statusMessage"
    [errorMessage]="errorMessage"
    [feed]="feed"
    [reactionOptions]="reactionOptions"
    [mediaUrl]="mediaUrlForView"
    [formatUploadSize]="formatUploadSizeForView"
    (composerFilesSelected)="onComposerFilesSelected($event)"
    (removeComposerUpload)="removeComposerUpload($event)"
    (publishPost)="publishPost()"
    (toggleReaction)="toggleReaction($event.post, $event.reaction)"></app-social-feed-column>

  <app-social-discovery-column
    [(searchQuery)]="searchQuery"
    [(searchScope)]="searchScope"
    [canGrantAccess]="canGrantAccess"
    [selectedGrantHandles]="selectedGrantHandles"
    [searchResults]="searchResults"
    [canSubmitSelectedAccess]="canSubmitSelectedAccess"
    [selectedProfile]="selectedProfile"
    [selectedProfileAvatarUrl]="profileAvatarUrl(selectedProfile)"
    [selectedProfileInitials]="profileInitials(selectedProfile?.displayName)"
    [mediaUrl]="mediaUrlForView"
    (performSearch)="performSearch()"
    (grantSelectedAccess)="grantSelectedAccess()"
    (removeGrantSelection)="removeGrantSelection($event)"
    (openProfile)="openProfile($event)"
    (toggleFollow)="toggleFollow($event)"
    (toggleGrantSelection)="toggleGrantSelection($event)"></app-social-discovery-column>
</main>

<ng-template #loadingState>
  <main class="social-page loading-state">
    <section class="loading-panel">
      <p class="kicker">Social hub</p>
      <h1>Loading your network...</h1>
    </section>
  </main>
</ng-template>
