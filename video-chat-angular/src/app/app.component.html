<div class="app-shell">
  <header class="topbar" *ngIf="auth.isAuthenticated">
    <a class="brand-link" routerLink="/">
      <img src="assets/pulseroom-mark.svg" alt="PulseRoom">
      <span>PulseRoom</span>
    </a>
    <div class="profile-actions">
      <a
        class="profile-link"
        routerLink="/social"
        routerLinkActive="active"
        aria-label="Open social profile"
        [attr.title]="profileName"
        (click)="closeProfileMenu()"
        (contextmenu)="openProfileMenu($event)">
        <span>{{ profileInitials }}</span>
      </a>
      <div class="profile-menu" *ngIf="profileMenuOpen" role="menu" aria-label="Profile actions">
        <button type="button" class="profile-menu-item" role="menuitem" (click)="logout()">
          Logout
        </button>
      </div>
    </div>
  </header>
  <router-outlet></router-outlet>
</div>
