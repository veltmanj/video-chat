<div class="app-shell">
  <header class="topbar" *ngIf="auth.isAuthenticated">
    <a class="brand-link" routerLink="/">
      <img src="assets/pulseroom-mark.svg" alt="PulseRoom">
      <span>PulseRoom</span>
    </a>
    <a
      class="profile-link"
      routerLink="/social"
      routerLinkActive="active"
      aria-label="Open social profile"
      [attr.title]="profileName">
      <img *ngIf="profileImageUrl; else profileFallback" [src]="profileImageUrl" [alt]="profileName" (error)="onProfileImageError()">
      <ng-template #profileFallback>
        <span>{{ profileInitials }}</span>
      </ng-template>
    </a>
  </header>
  <router-outlet></router-outlet>
</div>
