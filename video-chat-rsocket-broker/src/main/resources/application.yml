server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:9898}
  http2:
    enabled: ${SERVER_HTTP2_ENABLED:true}

spring:
  application:
    name: video-chat-rsocket-broker
  rsocket:
    server:
      transport: websocket
      mapping-path: ${BROKER_RSOCKET_MAPPING_PATH:/rsocket}
      spec:
        protocols: rsocket

broker:
  jwt:
    enabled: ${BROKER_JWT_ENABLED:false}
    cache-ttl: ${BROKER_JWT_CACHE_TTL:15m}
    clock-skew: ${BROKER_JWT_CLOCK_SKEW:30s}
    vault:
      uri: ${BROKER_JWT_VAULT_URI:http://localhost:8200}
      token: ${BROKER_JWT_VAULT_TOKEN:}
      kv-mount: ${BROKER_JWT_VAULT_KV_MOUNT:secret}
      request-timeout: ${BROKER_JWT_VAULT_REQUEST_TIMEOUT:5s}
  backoffice:
    enabled: ${BROKER_BACKOFFICE_ENABLED:true}
    route: ${BROKER_BACKOFFICE_ROUTE:backoffice.room.events.ingest}
    endpoints:
      - name: backoffice-a
        url: ${BROKER_BACKOFFICE_ENDPOINT:ws://localhost:7901/rsocket}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  metrics:
    tags:
      application: ${spring.application.name}
