server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:9898}

spring:
  application:
    name: video-chat-rsocket-broker
  rsocket:
    server:
      transport: websocket
      mapping-path: ${BROKER_RSOCKET_MAPPING_PATH:/rsocket}

broker:
  backoffice:
    enabled: ${BROKER_BACKOFFICE_ENABLED:true}
    route: ${BROKER_BACKOFFICE_ROUTE:backoffice.room.events.ingest}
    endpoints:
      - name: backoffice-a
        url: ${BROKER_BACKOFFICE_ENDPOINT:ws://localhost:7901/rsocket}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
