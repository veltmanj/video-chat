server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:7901}

spring:
  application:
    name: video-chat-backoffice
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/videochat}
    username: ${SPRING_DATASOURCE_USERNAME:videochat}
    password: ${SPRING_DATASOURCE_PASSWORD:videochat}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
  rsocket:
    server:
      transport: websocket
      mapping-path: ${BACKOFFICE_RSOCKET_MAPPING_PATH:/rsocket}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  metrics:
    tags:
      application: ${spring.application.name}

backoffice:
  ai:
    enabled: ${BACKOFFICE_AI_ENABLED:false}
    api-key: ${BACKOFFICE_AI_API_KEY:}
    model: ${BACKOFFICE_AI_MODEL:gpt-5-mini}
    assistant-name: ${BACKOFFICE_AI_ASSISTANT_NAME:Pulse Copilot}
    max-context-messages: ${BACKOFFICE_AI_MAX_CONTEXT_MESSAGES:8}
  social:
    auth:
      google-issuer: ${BACKOFFICE_SOCIAL_GOOGLE_ISSUER:https://accounts.google.com}
      google-jwk-set-uri: ${BACKOFFICE_SOCIAL_GOOGLE_JWK_SET_URI:https://www.googleapis.com/oauth2/v3/certs}
      google-audience: ${BACKOFFICE_SOCIAL_GOOGLE_AUDIENCE:}
    email:
      enabled: ${BACKOFFICE_SOCIAL_EMAIL_ENABLED:false}
      issuer: ${BACKOFFICE_SOCIAL_EMAIL_ISSUER:${BACKOFFICE_SOCIAL_PUBLIC_BASE_URL:https://localhost}/social-api/social/v1/auth}
      audience: ${BACKOFFICE_SOCIAL_EMAIL_AUDIENCE:pulseroom-email}
      jwk-json: ${BACKOFFICE_SOCIAL_EMAIL_JWK_JSON:}
      public-base-url: ${BACKOFFICE_SOCIAL_PUBLIC_BASE_URL:https://localhost}
      login-path: ${BACKOFFICE_SOCIAL_EMAIL_LOGIN_PATH:/login}
      registration-link-ttl: ${BACKOFFICE_SOCIAL_EMAIL_REGISTRATION_LINK_TTL:24h}
      login-link-ttl: ${BACKOFFICE_SOCIAL_EMAIL_LOGIN_LINK_TTL:20m}
      session-ttl: ${BACKOFFICE_SOCIAL_EMAIL_SESSION_TTL:12h}
      from-address: ${BACKOFFICE_SOCIAL_EMAIL_FROM_ADDRESS:no-reply@pulseroom.local}
      from-name: ${BACKOFFICE_SOCIAL_EMAIL_FROM_NAME:PulseRoom}
    feed-limit: ${BACKOFFICE_SOCIAL_FEED_LIMIT:50}
    search-limit: ${BACKOFFICE_SOCIAL_SEARCH_LIMIT:20}
    media:
      enabled: ${BACKOFFICE_SOCIAL_MEDIA_ENABLED:false}
      max-upload-bytes: ${BACKOFFICE_SOCIAL_MEDIA_MAX_UPLOAD_BYTES:26214400}
      max-files-per-post: ${BACKOFFICE_SOCIAL_MEDIA_MAX_FILES_PER_POST:4}
      endpoint: ${BACKOFFICE_SOCIAL_MEDIA_ENDPOINT:}
      access-key: ${BACKOFFICE_SOCIAL_MEDIA_ACCESS_KEY:}
      secret-key: ${BACKOFFICE_SOCIAL_MEDIA_SECRET_KEY:}
      bucket: ${BACKOFFICE_SOCIAL_MEDIA_BUCKET:social-media}
