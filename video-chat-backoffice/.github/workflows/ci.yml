name: Backoffice CI

on:
  push:
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B test
